---
# haveno-onion-grater.yml — filtro onion-grater CORRIGIDO para Haveno/RetoSwap 1.6.0
#
# Base: haveno.yml do instalador upstream (App/utils/haveno.yml).
# FIX (DIV-20260611-02): o Haveno 1.6.0 envia o ADD_ONION com parametros PoW
# (anti-DoS do hidden service) entre o tipo de chave e o Port:
#   ADD_ONION NEW:BEST PoWQueueBurst=100 PoWDefensesEnabled=1 PoWQueueRate=10 Port=9999,<porta>
# Os patterns do upstream so cobrem 'NEW:<tipo> Port=9999,...' — o comando real
# era bloqueado ('command filtered') e o Haveno caia com onSetupFailed.
# Adicionados os 2 primeiros patterns abaixo (com PoW); os antigos ficam como
# fallback para versoes sem PoW.
- apparmor-profiles:
    - '/opt/haveno/bin/Haveno'
  users:
    - 'amnesia'
  commands:
    AUTHCHALLENGE:
      - 'SAFECOOKIE .*'
    SETEVENTS:
      - 'CIRC ORCONN INFO NOTICE WARN ERR HS_DESC HS_DESC_CONTENT'
    GETINFO:
      - pattern: 'status/bootstrap-phase'
        response:
          - pattern: '250-status/bootstrap-phase=*'
            replacement: '250-status/bootstrap-phase=NOTICE BOOTSTRAP PROGRESS=100 TAG=done SUMMARY="Done"'
      - 'net/listeners/socks'
    ADD_ONION:
      - pattern:     'NEW:(\S+) PoWQueueBurst=(\S+) PoWDefensesEnabled=(\S+) PoWQueueRate=(\S+) Port=9999,(\S+)'
        replacement: 'NEW:{} PoWQueueBurst={} PoWDefensesEnabled={} PoWQueueRate={} Port=9999,{client-address}:{}'
      - pattern:     '(\S+):(\S+) PoWQueueBurst=(\S+) PoWDefensesEnabled=(\S+) PoWQueueRate=(\S+) Port=9999,(\S+)'
        replacement: '{}:{} PoWQueueBurst={} PoWDefensesEnabled={} PoWQueueRate={} Port=9999,{client-address}:{}'
      - pattern:     'NEW:(\S+) Port=9999,(\S+)'
        replacement: 'NEW:{} Port=9999,{client-address}:{}'
      - pattern:     '(\S+):(\S+) Port=9999,(\S+)'
        replacement: '{}:{} Port=9999,{client-address}:{}'
    DEL_ONION:
      - '.+'
    HSFETCH:
      - '.+'
  events:
    CIRC:
      suppress: true
    ORCONN:
      suppress: true
    INFO:
      suppress: true
    NOTICE:
      suppress: true
    WARN:
      suppress: true
    ERR:
      suppress: true
    HS_DESC:
      response:
        - pattern:     '650 HS_DESC CREATED (\S+) (\S+) (\S+) \S+ (.+)'
          replacement: '650 HS_DESC CREATED {} {} {} redacted {}'
        - pattern:     '650 HS_DESC UPLOAD (\S+) (\S+) .*'
          replacement: '650 HS_DESC UPLOAD {} {} redacted redacted'
        - pattern:     '650 HS_DESC UPLOADED (\S+) (\S+) .+'
          replacement: '650 HS_DESC UPLOADED {} {} redacted'
        - pattern:     '650 HS_DESC REQUESTED (\S+) NO_AUTH'
          replacement: '650 HS_DESC REQUESTED {} NO_AUTH'
        - pattern:     '650 HS_DESC REQUESTED (\S+) NO_AUTH \S+ \S+'
          replacement: '650 HS_DESC REQUESTED {} NO_AUTH redacted redacted'
        - pattern:     '650 HS_DESC RECEIVED (\S+) NO_AUTH \S+ \S+'
          replacement: '650 HS_DESC RECEIVED {} NO_AUTH redacted redacted'
        - pattern:     '.*'
          replacement: ''
    HS_DESC_CONTENT:
      suppress: true
